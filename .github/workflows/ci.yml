name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 and luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks > /dev/null
          sudo luarocks install luacheck > /dev/null

      - name: Lua syntax check
        run: |
          echo "Checking Lua syntax with luac5.1 -p ..."
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! OUTPUT=$(luac5.1 -p "$f" 2>&1); then
              echo "::error file=$f::Lua syntax error: $OUTPUT"
              FAIL=1
            fi
          done < <(find common/media/lua -name '*.lua' -print0)
          exit $FAIL

      - name: Luacheck
        run: luacheck common/media/lua/

      - name: Version consistency (2 locations)
        run: |
          V_ROOT=$(grep -oP 'modversion=\K[0-9]+\.[0-9]+\.[0-9]+' mod.info)
          V_42=$(grep -oP 'modversion=\K[0-9]+\.[0-9]+\.[0-9]+' 42/mod.info)

          echo "mod.info (root)  = $V_ROOT"
          echo "42/mod.info      = $V_42"

          FAIL=0
          if [ "$V_ROOT" != "$V_42" ]; then
            echo "::error::Version mismatch: mod.info=$V_ROOT vs 42/mod.info=$V_42"
            FAIL=1
          fi
          if [ "$FAIL" = "0" ]; then
            echo "All 2 version locations match: $V_ROOT"
          fi
          exit $FAIL

      - name: Sandbox translation completeness (JSON)
        run: |
          python3 <<'PYEOF'
          import re, sys, os

          opts_file = "common/media/sandbox-options.txt"
          trans_file = "42/media/lua/shared/Translate/EN/Sandbox.json"

          if not os.path.isfile(opts_file) or not os.path.isfile(trans_file):
              print("No sandbox options or translations yet — skipping.")
              sys.exit(0)

          with open(opts_file) as f:
              opts_text = f.read()

          with open(trans_file) as f:
              trans_text = f.read()

          fail = False

          option_blocks = re.split(r'\n\s*(?=option\s)', opts_text)
          for block in option_blocks:
              opt_match = re.search(r'option\s+(\S+)', block)
              if not opt_match:
                  continue
              key = opt_match.group(1).replace('.', '_')
              name_key = f"Sandbox_{key}_name"
              tooltip_key = f"Sandbox_{key}_tooltip"
              if name_key not in trans_text:
                  print(f"::error::Missing JSON translation key: {name_key}")
                  fail = True
              if tooltip_key not in trans_text:
                  print(f"::error::Missing JSON translation key: {tooltip_key}")
                  fail = True

              num_match = re.search(r'numValues\s*=\s*(\d+)', block)
              if num_match:
                  num_values = int(num_match.group(1))
                  for i in range(1, num_values + 1):
                      option_key = f"Sandbox_{key}_option{i}"
                      if option_key not in trans_text:
                          print(f"::error::Missing JSON enum translation key: {option_key}")
                          fail = True

          for m in re.finditer(r'page\s*=\s*(\w+)', opts_text):
              page_key = f"Sandbox_{m.group(1)}"
              if page_key not in trans_text:
                  print(f"::error::Missing JSON page title key: {page_key}")
                  fail = True

          if fail:
              sys.exit(1)
          print("All sandbox translation keys present in JSON.")
          PYEOF

      - name: PZ API deny-list scan
        run: python3 .github/pz-api-denylist.py common/media/lua/

      - name: Encoding check (UTF-8)
        run: |
          FAIL=0
          for dir in common/media 42/media; do
            if [ -d "$dir" ]; then
              while IFS= read -r -d '' f; do
                if ! python3 -c "open('$f', encoding='utf-8').read()" 2>/dev/null; then
                  echo "::error file=$f::Non-UTF-8 encoding detected"
                  FAIL=1
                fi
              done < <(find "$dir" \( -name '*.lua' -o -name '*.txt' -o -name '*.json' \) -print0)
            fi
          done
          if [ "$FAIL" = "0" ]; then
            echo "All files are valid UTF-8."
          fi
          exit $FAIL
